spring.application.name: demo-api

spring:
  config:
    import:
      - application-actuator.yaml
      - application-graphql.yaml
      - application-grpc.yaml
      - application-log.yaml
      - application-mongodb.yaml
      - application-mysql.yaml
      - application-security.yaml
      - application-web.yaml
      - application-client-alarm.yaml
      - application-client-auth.yaml
  graphql:
    schema:
      locations:
        - classpath:graphql/base/**
        - classpath:graphql/api/**
  cloud:
    aws:
      s3:
        region: ap-northeast-2