#https://techblog.woowahan.com/9232/
server:
  tomcat:
    mbeanregistry:
      enabled: true

management:
  server:
    port: 8793
  endpoint:
    health:
      access: read_only
      show-details: when_authorized
    info:
      access: read_only
    loggers:
      access: unrestricted
    threaddump:
      access: read_only
    prometheus:
      access: read_only
    metrics:
      access: read_only
  endpoints:
    web:
      base-path: /observer
      exposure:
        include: "health,info,loggers,threaddump,prometheus,metrics"